# @package _global_
# Config for taba/scripts/sampling/run_dit_sampling.py
# Override any field on the command line, e.g.
#   accelerate launch taba/scripts/sampling/run_dit_sampling.py n_prompts=1280 with_inversion=true
defaults:
  - _self_

hydra:
  output_subdir: null
  run:
    dir: .
  job:
    chdir: false

seed: 42
noises_per_prompt: 4
n_prompts: 128
batch_size: 64
num_inference_steps: 50
guidance_scale: 1.0
input_path: null
input_cond_path: null
cond_seed: 10
internal: false
with_inversion: false
with_reconstruction: false
save_dir: null
